<script>
var BARS=[],TRADES=[],STATS={};

// ── Indicators ────────────────────────────────────────────────────────────────
function sma(a,p){var o=new Array(a.length).fill(null);for(var i=p-1;i<a.length;i++){var s=0,ok=true;for(var j=i-p+1;j<=i;j++){if(a[j]==null){ok=false;break;}s+=a[j];}if(ok)o[i]=s/p;}return o;}
function stoch(b,kP,sl,dP){var rK=new Array(b.length).fill(null);for(var i=kP-1;i<b.length;i++){var hh=-1e9,ll=1e9;for(var j=i-kP+1;j<=i;j++){if(b[j][2]>hh)hh=b[j][2];if(b[j][3]<ll)ll=b[j][3];}rK[i]=(hh-ll)>0?100*(b[i][4]-ll)/(hh-ll):50;}var mK=sma(rK,sl);return{mK:mK,sD:sma(mK,dP)};}
function adxCalc(b,per){var n=b.length,pD=new Array(n).fill(0),mD=new Array(n).fill(0),tr=new Array(n).fill(0);for(var i=1;i<n;i++){var up=b[i][2]-b[i-1][2],dn=b[i-1][3]-b[i][3];pD[i]=(up>dn&&up>0)?up:0;mD[i]=(dn>up&&dn>0)?dn:0;tr[i]=Math.max(b[i][2]-b[i][3],Math.abs(b[i][2]-b[i-1][4]),Math.abs(b[i][3]-b[i-1][4]));}var sT=new Array(n).fill(null),sP=new Array(n).fill(null),sM=new Array(n).fill(null),ts=0,ps=0,ms=0;for(var i=1;i<=per&&i<n;i++){ts+=tr[i];ps+=pD[i];ms+=mD[i];}if(per<n){sT[per]=ts;sP[per]=ps;sM[per]=ms;}for(var i=per+1;i<n;i++){sT[i]=sT[i-1]-sT[i-1]/per+tr[i];sP[i]=sP[i-1]-sP[i-1]/per+pD[i];sM[i]=sM[i-1]-sM[i-1]/per+mD[i];}var dx=new Array(n).fill(null),adx=new Array(n).fill(null);for(var i=per;i<n;i++){if(sT[i]>0){var pi=100*sP[i]/sT[i],mi=100*sM[i]/sT[i],s=pi+mi;dx[i]=s>0?100*Math.abs(pi-mi)/s:0;}}var se=Math.min(per*2,n),ds=0,dc=0;for(var i=per;i<se;i++){if(dx[i]!=null){ds+=dx[i];dc++;}}if(dc&&se-1<n)adx[se-1]=ds/dc;for(var i=se;i<n;i++){if(adx[i-1]!=null&&dx[i]!=null)adx[i]=(adx[i-1]*(per-1)+dx[i])/per;}return adx;}
function psarCalc(b,st,mx){var n=b.length,sar=new Array(n).fill(null),bull=new Array(n).fill(null),iB=true,af=st,ep=b[0][2],pv=b[0][3];sar[0]=pv;bull[0]=true;for(var i=1;i<n;i++){pv=pv+af*(ep-pv);if(iB){pv=Math.min(pv,b[Math.max(0,i-1)][3],b[Math.max(0,i-2)][3]);if(b[i][3]<pv){iB=false;pv=ep;ep=b[i][3];af=st;}else if(b[i][2]>ep){ep=b[i][2];af=Math.min(af+st,mx);}}else{pv=Math.max(pv,b[Math.max(0,i-1)][2],b[Math.max(0,i-2)][2]);if(b[i][2]>pv){iB=true;pv=ep;ep=b[i][2];af=st;}else if(b[i][3]<ep){ep=b[i][3];af=Math.min(af+st,mx);}}sar[i]=pv;bull[i]=iB;}return{sar:sar,bull:bull};}
function fractals(b,fn){var fH=new Array(b.length).fill(null),fL=new Array(b.length).fill(null);for(var i=fn;i<b.length-fn;i++){var isH=true,isL=true;for(var j=i-fn;j<=i+fn;j++){if(j===i)continue;if(b[j][2]>=b[i][2])isH=false;if(b[j][3]<=b[i][3])isL=false;}if(isH)fH[i]=b[i][2];if(isL)fL[i]=b[i][3];}return{fH:fH,fL:fL};}
function b4(b1){var o=[];for(var i=0;i+3<b1.length;i+=4){var g=b1.slice(i,i+4);o.push([g[0][0],g[0][1],Math.max.apply(null,g.map(function(x){return x[2];})),Math.min.apply(null,g.map(function(x){return x[3];})),g[3][4],i+3]);}return o;}
function b4map(b1,bx){var m=new Array(b1.length).fill(-1),h=-1;for(var i=0;i<b1.length;i++){while(h+1<bx.length&&bx[h+1][5]<i)h++;m[i]=h;}return m;}
function nFH(fH,idx,ab){for(var i=idx;i>=0;i--){if(fH[i]!=null&&fH[i]>ab)return fH[i];}return null;}
function nFL(fL,idx,bl){for(var i=idx;i>=0;i--){if(fL[i]!=null&&fL[i]<bl)return fL[i];}return null;}
function tt(ts,off){var d=new Date((ts+off*3600)*1000);return d.toISOString().slice(0,16).replace('T',' ');}

// ── Strategy ──────────────────────────────────────────────────────────────────
function runStrategy(b1,p){
  var bx=b4(b1),mp=b4map(b1,bx);
  var s1=stoch(b1,2,20,20),s2=stoch(b1,5,3,3),adx=adxCalc(b1,p.ap),ps=psarCalc(b1,p.ps,p.pm);
  var fr=fractals(b1,p.fn),s4=stoch(bx,2,20,20);
  var trades=[],bSt=0,sSt=0;
  for(var i=2;i<b1.length;i++){
    var k1=s1.mK[i],d1=s1.sD[i],k1p=s1.mK[i-1],d1p=s1.sD[i-1];
    var av=adx[i],avp=adx[i-1];
    if([k1,d1,k1p,d1p,av,avp].some(function(v){return v==null;}))continue;
    var psB=ps.bull[i];
    var s1Bull=k1>d1,s1Bear=k1<d1,s1BX=k1p<=d1p&&k1>d1,s1BrX=k1p>=d1p&&k1<d1;
    var adxUp=avp<=p.al&&av>p.al,adxDn=avp>=p.al&&av<p.al;
    var h4i=mp[i],h4e=h4i>=0&&bx[h4i]?bx[h4i][5]:i;
    var htfPB=h4i>=0&&ps.bull[Math.min(h4e,b1.length-1)];
    var htfSB=h4i>=0&&s4.mK[h4i]!=null&&s4.sD[h4i]!=null&&s4.mK[h4i]>s4.sD[h4i];
    var htfSBr=h4i>=0&&s4.mK[h4i]!=null&&s4.sD[h4i]!=null&&s4.mK[h4i]<s4.sD[h4i];
    var k2=s2.mK[i],d2=s2.sD[i],s2Bull=k2!=null&&d2!=null&&k2>d2,s2Bear=k2!=null&&d2!=null&&k2<d2;
    // BUY
    if(bSt===0){if(psB&&s1BX)bSt=1;}
    else if(bSt===1){
      if(!psB||!s1Bull)bSt=0;
      else if(adxUp&&s2Bear&&b1[i][4]<b1[i][1]&&htfPB&&htfSB){
        var ep=b1[i][4],sl=ps.sar[i],tp=nFH(fr.fH,i-1,ep);
        if(tp!=null&&sl!=null&&sl<ep&&tp>ep){
          var r=sim(b1,i,ep,sl,tp,'BUY');
          var pp=r.xp-ep,rr=Math.abs(ep-sl)>0?pp/Math.abs(ep-sl):0;
          trades.push({dir:'BUY',t:tt(b1[i][0],p.tz),ep:ep,sl:sl,tp:tp,xt:tt(b1[r.xi][0],p.tz),xp:r.xp,rsn:r.rsn,pips:pp,r:rr,pnl:pp*p.lot});
        }
        bSt=0;
      }
    }
    // SELL
    if(sSt===0){if(!psB&&s1BrX)sSt=1;}
    else if(sSt===1){
      if(psB||!s1Bear)sSt=0;
      else if(adxDn&&s2Bull&&b1[i][4]>b1[i][1]&&!htfPB&&htfSBr){
        var ep=b1[i][4],sl=ps.sar[i],tp=nFL(fr.fL,i-1,ep);
        if(tp!=null&&sl!=null&&sl>ep&&tp<ep){
          var r=sim(b1,i,ep,sl,tp,'SELL');
          var pp=ep-r.xp,rr=Math.abs(ep-sl)>0?pp/Math.abs(ep-sl):0;
          trades.push({dir:'SELL',t:tt(b1[i][0],p.tz),ep:ep,sl:sl,tp:tp,xt:tt(b1[r.xi][0],p.tz),xp:r.xp,rsn:r.rsn,pips:pp,r:rr,pnl:pp*p.lot});
        }
        sSt=0;
      }
    }
  }
  return trades;
}
function sim(b,i,ep,sl,tp,dir){
  var lim=Math.min(i+500,b.length-1);
  for(var j=i+1;j<=lim;j++){
    if(dir==='BUY'){if(b[j][3]<=sl)return{xi:j,xp:sl,rsn:'SL'};if(b[j][2]>=tp)return{xi:j,xp:tp,rsn:'TP'};}
    else{if(b[j][2]>=sl)return{xi:j,xp:sl,rsn:'SL'};if(b[j][3]<=tp)return{xi:j,xp:tp,rsn:'TP'};}
  }
  return{xi:lim,xp:b[lim][4],rsn:'TIME'};
}
function calcStats(trades,bal){
  var wins=trades.filter(function(t){return t.pips>0;}),losses=trades.filter(function(t){return t.pips<=0;});
  var buys=trades.filter(function(t){return t.dir==='BUY';}),sells=trades.filter(function(t){return t.dir==='SELL';});
  var gw=wins.reduce(function(s,t){return s+t.pips;},0),gl=Math.abs(losses.reduce(function(s,t){return s+t.pips;},0));
  var cum=0,peak=0,maxDD=0,cumPnl=0;
  var eq=trades.map(function(t){cum+=t.pips;cumPnl+=t.pnl;if(cum>peak)peak=cum;var dd=peak-cum;if(dd>maxDD)maxDD=dd;return cum;});
  return{n:trades.length,wins:wins.length,wr:trades.length?wins.length/trades.length*100:0,pf:gl>0?gw/gl:Infinity,
    netPips:cum,avgWin:wins.length?gw/wins.length:0,avgLoss:losses.length?gl/losses.length:0,
    maxDD:maxDD,eq:eq,buys:buys.length,sells:sells.length,
    buyWins:buys.filter(function(t){return t.pips>0;}).length,
    sellWins:sells.filter(function(t){return t.pips>0;}).length,
    finalBal:bal+cumPnl,netPnl:cumPnl};
}

// ── Synthetic data ────────────────────────────────────────────────────────────
function useSynth(){
  var b=[],p=50000,trend=0,td=0,vol=800;
  var ts=1672531200;
  for(var i=0;i<17520;i++){
    if(td<=0){trend=(Math.random()-.47)*2;td=30+Math.floor(Math.random()*80);vol=400+Math.random()*1200;}
    td--;
    var chg=trend*(vol*.4)+(Math.random()-.5)*vol;
    var op=p;p=Math.max(5000,p+chg);
    var sp=Math.abs(chg)*.5+Math.random()*vol*.3;
    b.push([ts+i*3600,op,Math.max(op,p)+sp*Math.random(),Math.min(op,p)-sp*Math.random(),p]);
  }
  BARS=b;
  setDS('✓ Synthetic BTCUSD — 17,520 bars (demo only, not real data)','ok');
  document.getElementById('rb').disabled=false;
}

// ── Alpaca fetch ──────────────────────────────────────────────────────────────
async function fetchAlpaca(){
  var key=document.getElementById('ak').value.trim();
  var sec=document.getElementById('as').value.trim();
  var start=document.getElementById('sd').value;
  if(!key||!sec){setDS('Enter API key and secret first','er');return;}
  document.getElementById('rb').disabled=true;
  setDS('Connecting to Alpaca…','wn');
  try{
    var all=[],nxt=null,pg=0;
    do{
      pg++;
      var url='https://data.alpaca.markets/v1beta3/crypto/us/bars?symbols=BTC%2FUSD&timeframe=1Hour&start='+start+'T00:00:00Z&limit=1000&sort=asc';
      if(nxt)url+='&page_token='+encodeURIComponent(nxt);
      var resp=await fetch(url,{headers:{'APCA-API-KEY-ID':key,'APCA-API-SECRET-KEY':sec}});
      if(!resp.ok)throw new Error('HTTP '+resp.status+': '+resp.statusText);
      var data=await resp.json();
      var bars=(data.bars&&data.bars['BTC/USD'])||[];
      bars.forEach(function(b){
        var ts=Math.floor(new Date(b.t).getTime()/1000);
        all.push([ts,b.o,b.h,b.l,b.c]);
      });
      nxt=data.next_page_token||null;
      setDS('Fetching page '+pg+'… ('+all.length.toLocaleString()+' bars)','wn');
    }while(nxt);
    all.sort(function(a,b){return a[0]-b[0];});
    BARS=all;
    var d0=new Date(BARS[0][0]*1000).toISOString().slice(0,10);
    var d1=new Date(BARS[BARS.length-1][0]*1000).toISOString().slice(0,10);
    setDS('✓ '+BARS.length.toLocaleString()+' bars loaded from Alpaca ('+d0+' → '+d1+')','ok');
    document.getElementById('rb').disabled=false;
  }catch(e){
    setDS('Alpaca failed: '+e.message+'. Try synthetic data.','er');
    document.getElementById('rb').disabled=false;
  }
}

// ── Run backtest ──────────────────────────────────────────────────────────────
function runBT(){
  if(!BARS.length){alert('Load data first');return;}
  document.getElementById('rb').disabled=true;
  document.getElementById('rb').textContent='Computing…';
  setTimeout(function(){
    var p={ap:+document.getElementById('ap').value,al:+document.getElementById('al').value,
      ps:+document.getElementById('ps').value,pm:+document.getElementById('pm').value,
      fn:+document.getElementById('fn').value,lot:+document.getElementById('lot').value,
      tz:+document.getElementById('tz').value};
    var bal=+document.getElementById('bal').value;
    try{
      TRADES=runStrategy(BARS,p);
      STATS=calcStats(TRADES,bal);
      renderResults(STATS,TRADES,bal);
      document.getElementById('rc').style.display='block';
      document.getElementById('rc').scrollIntoView({behavior:'smooth'});
    }catch(e){alert('Error: '+e.message);}
    document.getElementById('rb').disabled=false;
    document.getElementById('rb').textContent='▶ Run Backtest';
  },60);
}

// ── Render ────────────────────────────────────────────────────────────────────
function f(v,d){d=d||1;return(v==null||isNaN(v))?'—':v.toFixed(d);}
function renderResults(s,trades,bal){
  var sc=[['Total trades',s.n,null],['Win rate',f(s.wr,1)+'%',s.wr>=50],
    ['Profit factor',isFinite(s.pf)?f(s.pf):'∞',s.pf>=1.5],['Net pips',f(s.netPips,0),s.netPips>=0],
    ['Avg win',f(s.avgWin,0)+' pips',true],['Avg loss','-'+f(s.avgLoss,0)+' pips',false],
    ['Max DD',f(s.maxDD,0)+' pips',false],['Net P&L','$'+f(s.netPnl,2),s.netPnl>=0],
    ['Final bal','$'+s.finalBal.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}),s.finalBal>bal],
    ['Buy/Sell wins',s.buyWins+'/'+s.sellWins,null]];
  var h='<div class="sg">';
  sc.forEach(function(x){
    var cl=x[2]===null?'':x[2]?'pos':'neg';
    h+='<div class="sc"><div class="sl">'+x[0]+'</div><div class="sv '+cl+'">'+x[1]+'</div></div>';
  });
  h+='</div>'+eqChart(s.eq);
  document.getElementById('sm').innerHTML=h;
  // Yearly
  var by={};
  trades.forEach(function(t){var y=t.t.slice(0,4);if(!by[y]){by[y]={w:0,p:0,tot:0};}if(t.pips>0)by[y].w++;by[y].p+=t.pips;by[y].tot++;});
  var yrs=Object.keys(by).sort(),mx=Math.max.apply(null,yrs.map(function(y){return Math.abs(by[y].p);}));
  var yh='';
  yrs.forEach(function(y){
    var d=by[y],bw=mx?Math.abs(d.p)/mx*100:0,col=d.p>=0?'#22B8A6':'#EF5D60',wr=d.tot?Math.round(d.w/d.tot*100):0;
    yh+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px"><span style="color:#555;font-family:monospace;width:36px;flex-shrink:0">'+y+'</span><div style="flex:1;background:#0A0D11;border-radius:3px;height:13px;overflow:hidden"><div style="width:'+bw+'%;height:100%;background:'+col+'"></div></div><span style="color:'+col+';font-family:monospace;width:75px;text-align:right;flex-shrink:0">'+(d.p>=0?'+':'')+Math.round(d.p)+'</span><span style="color:#444;width:36px;flex-shrink:0;text-align:right">'+wr+'%</span></div>';
  });
  document.getElementById('yr').innerHTML=yh||'<p style="color:#4B5563">No data.</p>';
  // Trade log
  var th='<div class="tw"><table><thead><tr><th>#</th><th>Dir</th><th>Entry</th><th>Price</th><th>SL</th><th>TP</th><th>Exit</th><th>Exit$</th><th>Rsn</th><th>Pips</th><th>P&L</th></tr></thead><tbody>';
  trades.forEach(function(t,i){
    var dc=t.dir==='BUY'?'pos':'neg',rc=t.rsn==='TP'?'pos':t.rsn==='SL'?'neg':'',pc=t.pips>=0?'pos':'neg';
    th+='<tr><td>'+(i+1)+'</td><td class="'+dc+'">'+t.dir+'</td><td>'+t.t+'</td><td>'+t.ep.toLocaleString()+'</td><td>'+t.sl.toFixed(0)+'</td><td>'+t.tp.toFixed(0)+'</td><td>'+t.xt+'</td><td>'+t.xp.toFixed(0)+'</td><td class="'+rc+'">'+t.rsn+'</td><td class="'+pc+'">'+(t.pips>=0?'+':'')+f(t.pips,1)+'</td><td class="'+pc+'">'+(t.pnl>=0?'+$':'-$')+Math.abs(t.pnl).toFixed(2)+'</td></tr>';
  });
  th+='</tbody></table></div>';
  document.getElementById('tl').innerHTML=th;
  document.getElementById('ao').innerHTML='';
}
function eqChart(eq){
  if(!eq||!eq.length)return'';
  var W=320,H=80,p=8,mn=Math.min.apply(null,[0].concat(eq)),mx=Math.max.apply(null,[0].concat(eq));
  if(mn===mx){mn-=1;mx+=1;}
  var rng=mx-mn,px=function(i){return p+(i/(eq.length-1||1))*(W-p*2);},py=function(v){return H-p-((v-mn)/rng)*(H-p*2);};
  var segs='';
  for(var i=1;i<eq.length;i++){segs+='<line x1="'+px(i-1)+'" y1="'+py(eq[i-1])+'" x2="'+px(i)+'" y2="'+py(eq[i])+'" stroke="'+(eq[i]>=0?'#22B8A6':'#EF5D60')+'" stroke-width="1.5"/>';}
  return'<div class="eq"><div style="font-size:10px;color:#4B5563;margin-bottom:6px">Equity curve (pips)</div><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block"><line x1="'+p+'" y1="'+py(0)+'" x2="'+(W-p)+'" y2="'+py(0)+'" stroke="rgba(255,255,255,.07)" stroke-width="1"/>'+segs+'</svg></div>';
}
function sw(id,btn){
  ['sm','yr','tl','ai'].forEach(function(x){document.getElementById(x).style.display='none';});
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
}
function setDS(msg,type){var el=document.getElementById('ds');el.textContent=msg;el.className='st '+type;}

// ── AI Analysis ───────────────────────────────────────────────────────────────
async function runAI(){
  if(!TRADES.length){alert('Run backtest first');return;}
  var s=STATS,ao=document.getElementById('ao');
  ao.innerHTML='<div style="text-align:center;padding:20px;color:#22B8A6">Analysing '+s.n+' trades…</div>';
  var p={ap:document.getElementById('ap').value,al:document.getElementById('al').value,ps:document.getElementById('ps').value,pm:document.getElementById('pm').value,fn:document.getElementById('fn').value,lot:document.getElementById('lot').value,tz:document.getElementById('tz').value};
  var prompt='You are a professional quantitative trading analyst. Give a thorough honest analysis of this backtest.\n\nSTRATEGY: ADX('+p.ap+') + Stochastic Dual TF — BTCUSD 1H\nBUY: PSar below + Stoch(2,20,20) bullish cross → ADX crosses UP above '+p.al+' + Stoch(5,3,3) bearish + bearish candle. TP=nearest fractal high. SL=PSar below entry.\nSELL: PSar above + Stoch(2,20,20) bearish cross → ADX crosses DOWN below '+p.al+' + Stoch(5,3,3) bullish + bullish candle. TP=nearest fractal low. SL=PSar above entry.\n\nRESULTS:\nTrades: '+s.n+' ('+s.buys+' buys / '+s.sells+' sells)\nWin rate: '+f(s.wr,1)+'%\nProfit factor: '+(isFinite(s.pf)?f(s.pf):'∞')+'\nNet pips: '+f(s.netPips,0)+'\nAvg win: '+f(s.avgWin,0)+' | Avg loss: '+f(s.avgLoss,0)+'\nMax drawdown: '+f(s.maxDD,0)+' pips\nNet P&L: $'+f(s.netPnl,2)+' | Final: $'+f(s.finalBal,2)+'\n\nFirst 5 trades:\n'+TRADES.slice(0,5).map(function(t,i){return(i+1)+'. '+t.dir+' '+t.t+' @ '+t.ep.toFixed(0)+' SL='+t.sl.toFixed(0)+' TP='+t.tp.toFixed(0)+' → '+t.rsn+' '+(t.pips>=0?'+':'')+t.pips.toFixed(0)+' pips';}).join('\n')+'\n\nWrite analysis with sections: 1.VERDICT 2.STRENGTHS 3.WEAKNESSES 4.RISK/REWARD 5.MARKET CONDITIONS 6.IMPROVEMENTS 7.RISK MANAGEMENT 8.RECOMMENDATION\nBe specific, reference actual numbers.';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    var data=await resp.json();
    if(data.content){ao.innerHTML='<div class="ab">'+data.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';}
    else ao.innerHTML='<p style="color:#EF5D60">Error: '+(data.error&&data.error.message||JSON.stringify(data))+'</p>';
  }catch(e){ao.innerHTML='<p style="color:#EF5D60">Error: '+e.message+'</p>';}
}
